<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker</title>
    <link rel="stylesheet" href="/static/css/main.css?v=8">
    <style>
        .osc-outer { display: flex; flex-direction: column; height: calc(100vh - 56px); }
        .osc-topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .osc-main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 16px; gap: 16px; }
        .chart-container { position: relative; width: 100%; min-height: 250px; }
        .chart-container canvas { width: 100%; height: 100%; }
        .controls-panel { display: flex; flex-wrap: wrap; gap: 24px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
        .wave-group { display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
        .wave-group h4 { margin: 0; font-size: 13px; color: var(--text-muted); }
        .slider-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .slider-row label { min-width: 70px; color: var(--text-muted); }
        .slider-row input[type=range] { flex: 1; }
        .slider-row .val { min-width: 50px; text-align: right; font-family: monospace; font-size: 11px; }
        .fit-info { font-size: 12px; color: var(--text-muted); padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
        .trial-btn { padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; border-radius: var(--radius); }
        .trial-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/">Movement Tracker</a></h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/videos">Videos</a>
            <a href="/mediapipe-select">MediaPipe</a>
            <a href="/deidentify">Deidentify</a>
            <a href="/labeling-select">DLC</a>
            <a href="/mano">MANO</a>
            <a href="/results">Results</a>
            <a href="/oscillations" class="active">Oscillations</a>
            <a href="/remote">Processing</a>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="osc-outer">
        <div class="osc-topbar">
            <label style="font-size:12px;color:var(--text-muted);">Subject</label>
            <select id="subjectSelect"></select>
            <div id="trialBtns" style="display:flex;gap:4px;"></div>
            <label style="font-size:12px;color:var(--text-muted);margin-left:auto;">
                <input type="checkbox" id="showDistance" checked onchange="osc.render()"> Distance trace
            </label>
        </div>

        <div class="osc-main">
            <!-- Chart -->
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>

            <!-- Sine wave controls -->
            <div class="controls-panel">
                <div class="wave-group">
                    <h4 style="color:rgba(255,152,0,0.9);">Wave 1</h4>
                    <div class="slider-row">
                        <label>Frequency</label>
                        <input type="range" id="w1Freq" min="0.01" max="12" step="0.01" value="0.3" oninput="osc.updateWave()">
                        <span class="val" id="w1FreqVal">0.30 Hz</span>
                    </div>
                    <div class="slider-row">
                        <label>Amplitude</label>
                        <input type="range" id="w1Amp" min="0" max="100" step="0.5" value="20" oninput="osc.updateWave()">
                        <span class="val" id="w1AmpVal">20.0 mm</span>
                    </div>
                    <div class="slider-row">
                        <label>Phase</label>
                        <input type="range" id="w1Phase" min="0" max="6.283" step="0.01" value="0" oninput="osc.updateWave()">
                        <span class="val" id="w1PhaseVal">0.00 rad</span>
                    </div>
                    <div class="slider-row">
                        <label>Offset</label>
                        <input type="range" id="w1Offset" min="-50" max="200" step="0.5" value="50" oninput="osc.updateWave()">
                        <span class="val" id="w1OffsetVal">50.0 mm</span>
                    </div>
                </div>

                <div class="wave-group">
                    <h4 style="color:rgba(76,175,80,0.9);">Wave 2</h4>
                    <div class="slider-row">
                        <label>Frequency</label>
                        <input type="range" id="w2Freq" min="0.01" max="12" step="0.01" value="0.1" oninput="osc.updateWave()">
                        <span class="val" id="w2FreqVal">0.10 Hz</span>
                    </div>
                    <div class="slider-row">
                        <label>Amplitude</label>
                        <input type="range" id="w2Amp" min="0" max="100" step="0.5" value="10" oninput="osc.updateWave()">
                        <span class="val" id="w2AmpVal">10.0 mm</span>
                    </div>
                    <div class="slider-row">
                        <label>Phase</label>
                        <input type="range" id="w2Phase" min="0" max="6.283" step="0.01" value="0" oninput="osc.updateWave()">
                        <span class="val" id="w2PhaseVal">0.00 rad</span>
                    </div>
                    <div class="slider-row">
                        <label>Offset</label>
                        <input type="range" id="w2Offset" min="-50" max="200" step="0.5" value="0" oninput="osc.updateWave()">
                        <span class="val" id="w2OffsetVal">0.0 mm</span>
                    </div>
                </div>

                <div class="wave-group">
                    <h4>Combined</h4>
                    <label style="font-size:12px;color:var(--text-muted);">
                        <input type="checkbox" id="showWave1" checked onchange="osc.render()"> Show Wave 1
                    </label>
                    <label style="font-size:12px;color:var(--text-muted);">
                        <input type="checkbox" id="showWave2" checked onchange="osc.render()"> Show Wave 2
                    </label>
                    <label style="font-size:12px;color:var(--text-muted);">
                        <input type="checkbox" id="showSum" checked onchange="osc.render()"> Show Sum
                    </label>
                    <button class="btn btn-sm" onclick="osc.autoFit()" style="margin-top:4px;">Auto-fit</button>
                </div>
            </div>

            <div class="fit-info" id="fitInfo"></div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/nav.js"></script>
    <script src="/static/js/oscillations.js?v=1"></script>
</body>
</html>
