<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker</title>
    <link rel="stylesheet" href="/static/css/main.css?v=8">
    <style>
        body { overflow: hidden; }

        /* ── Full-height layout ── */
        .videos-outer {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 49px); /* minus header */
            overflow: hidden;
        }

        /* ── Subject + trial selection row ── */
        .videos-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 14px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .videos-topbar select {
            padding: 4px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 13px;
        }

        #trialBtns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .trial-btn {
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.15s;
        }
        .trial-btn:hover { border-color: var(--blue); color: var(--text); }
        .trial-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* ── Video canvas ── */
        .videos-viewport {
            flex: 1;
            position: relative;
            min-height: 0;
            background: #111;
            overflow: hidden;
        }
        .videos-viewport canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Bottom controls ── */
        .videos-controls {
            flex-shrink: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 8px 14px 10px;
        }

        /* Timeline row */
        .timeline-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }
        .timeline-row input[type="range"] {
            flex: 1;
            cursor: pointer;
            height: 4px;
            accent-color: var(--blue);
        }
        .frame-counter {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        .frame-counter strong { color: var(--text); }

        /* Playback row */
        .playback-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .playback-row .divider {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 4px;
        }
        .speed-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .speed-wrap label {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .speed-wrap input[type="range"] {
            width: 80px;
            cursor: pointer;
            height: 4px;
            accent-color: var(--blue);
        }
        #speedDisplay {
            font-size: 11px;
            color: var(--blue);
            font-weight: 600;
            min-width: 28px;
        }
        .spacer { flex: 1; }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/">Movement Tracker</a></h1>
        <nav>            <a href="/">Dashboard</a>
            <a href="/videos" class="active">Videos</a>
            <a href="/mediapipe-select">MediaPipe</a>
            <a href="/deidentify">Deidentify</a>
            <a href="/labeling-select">DLC</a>
            <a href="/results">Results</a>

            <a href="/remote">Processing</a>
            <a href="/settings">Settings</a>
            <a href="/tutorials">Tutorials</a>
        </nav>
    </div>

    <div class="videos-outer">

        <!-- Subject + trial buttons row -->
        <div class="videos-topbar">
            <select id="subjectSelect"></select>
            <div id="trialBtns"></div>
            <button class="btn btn-sm" id="browseBtn" title="Open any video file">Browse…</button>
            <input type="file" id="browseInput" accept="video/*" style="display:none;">
        </div>

        <!-- Video canvas -->
        <div class="videos-viewport">
            <canvas id="canvas"></canvas>
        </div>

        <!-- Bottom controls -->
        <div class="videos-controls">
            <!-- Timeline -->
            <div class="timeline-row">
                <input type="range" id="timelineSlider" min="0" max="1000" value="0">
                <span class="frame-counter">
                    Frame <strong id="frameDisplay">0</strong> / <strong id="totalFramesDisplay">0</strong>
                </span>
            </div>
            <!-- Playback -->
            <div class="playback-row">
                <button class="btn btn-sm" id="prevFrameBtn" title="Prev frame (A/←)">&#8592;</button>
                <button class="btn btn-sm" id="playBtn"     title="Play/Pause (Space)">&#9654;</button>
                <button class="btn btn-sm" id="nextFrameBtn" title="Next frame (S/→)">&#8594;</button>

                <div class="divider"></div>

                <div class="speed-wrap">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0" max="10" value="3">
                    <span id="speedDisplay">1x</span>
                </div>

                <div class="divider"></div>

                <button class="btn btn-sm" id="sideToggle"  title="Switch camera (E)">Switch Camera</button>
                <button class="btn btn-sm" id="resetZoomBtn" title="Reset zoom (Z)">Reset Zoom</button>

                <div class="spacer"></div>

                <button class="btn btn-sm btn-primary" id="exportBtn" onclick="openExportModal()">Export Video</button>
            </div>
        </div>

    </div>

    <script src="/static/js/nav.js"></script>
    <script src="/static/js/api.js?v=12"></script>
    <script src="/static/js/video-export.js?v=3"></script>
    <script src="/static/js/videos.js?v=3"></script>
</body>
</html>
