<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker</title>
    <link rel="stylesheet" href="/static/css/main.css?v=8">
    <style>
        body { overflow: hidden; }

        /* ── Full-height layout ── */
        .videos-outer {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 49px); /* minus header */
            overflow: hidden;
        }

        /* ── Subject + trial selection row ── */
        .videos-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 14px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .videos-topbar select {
            padding: 4px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 13px;
        }

        #trialBtns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .trial-btn {
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.15s;
        }
        .trial-btn:hover { border-color: var(--blue); color: var(--text); }
        .trial-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* ── Video canvas ── */
        .videos-viewport {
            flex: 1;
            position: relative;
            min-height: 0;
            background: #111;
            overflow: hidden;
        }
        .videos-viewport canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Bottom controls ── */
        .videos-controls {
            flex-shrink: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 8px 14px 10px;
        }

        /* Timeline row */
        .timeline-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }
        .timeline-row input[type="range"] {
            flex: 1;
            cursor: pointer;
            height: 4px;
            accent-color: var(--blue);
        }
        .frame-counter {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        .frame-counter strong { color: var(--text); }

        /* Playback row */
        .playback-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .playback-row .divider {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 4px;
        }
        .speed-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .speed-wrap label {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .speed-wrap input[type="range"] {
            width: 80px;
            cursor: pointer;
            height: 4px;
            accent-color: var(--blue);
        }
        #speedDisplay {
            font-size: 11px;
            color: var(--blue);
            font-weight: 600;
            min-width: 28px;
        }
        .spacer { flex: 1; }

        /* ── Export-mode trim UI ── */
        .timeline-wrap {
            position: relative;
            flex: 1;
            height: 24px;
        }
        .timeline-wrap > input#timelineSlider {
            position: absolute;
            left: 0; right: 0;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin: 0;
        }
        #trimUI {
            position: absolute;
            inset: 0;
        }
        #trimTrack {
            position: absolute;
            left: 0; right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 6px;
            border-radius: 3px;
            background: #2196f3;
            pointer-events: none;
        }
        .trim-slider {
            position: absolute;
            left: 0; right: 0;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            pointer-events: none;
            height: 24px;
            margin: 0;
        }
        .trim-slider::-webkit-slider-runnable-track { background: transparent; }
        .trim-slider::-moz-range-track { background: transparent; }
        .trim-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            pointer-events: auto;
            width: 14px; height: 20px;
            background: #FF9800;
            border: 1px solid #a35f00;
            border-radius: 3px;
            cursor: ew-resize;
            margin-top: 0;
        }
        .trim-slider::-moz-range-thumb {
            pointer-events: auto;
            width: 14px; height: 20px;
            background: #FF9800;
            border: 1px solid #a35f00;
            border-radius: 3px;
            cursor: ew-resize;
        }
        body.export-mode #speedSlider { accent-color: #FF9800; }
        body.export-mode #speedDisplay { color: #FF9800; }
        body.export-mode .speed-wrap label { color: #FF9800; }
        body.export-mode #exportBtn { background: var(--blue); color:#fff; border-color: var(--blue); }
        /* OS | OD camera toggle: tint everything orange in export mode.
           Bold vs. normal font-weight (set inline) still distinguishes the
           active eye. */
        body.export-mode #sideToggle { border-color: #FF9800; }
        body.export-mode #sideToggle span { color: #FF9800 !important; }
        /* Make the default Export Video button match the other (darker) toolbar buttons */
        #exportBtn { /* same as .btn.btn-sm default */ }

        #exportStatus {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 8px;
            white-space: nowrap;
        }
        #exportStatus a { color: var(--blue); margin-left: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/">Movement Tracker</a></h1>
        <nav>
            <a href="/videos" class="active nav-browse">Browse Videos</a>
            <a href="/subjects">Subjects</a>
            <span class="nav-dropdown">
                <a href="/labels">Analyze</a>
                <div class="nav-dropdown-menu">
                    <a href="/preproc">Pre-proc</a>
                    <a href="/labels">Labels</a>
                    <a href="/labeling-select">DLC</a>
                    <a href="/events">Events</a>
                    <a href="/deidentify">Deidentify</a>
                </div>
            </span>
            <span class="nav-dropdown">
                <a href="/results">Results</a>
                <div class="nav-dropdown-menu">
                    <a href="/results?tab=distances">Individual</a>
                    <a href="/results?tab=group">Group Comparison</a>
                    <a href="/explore">Explore</a>
                    <a href="/oscillations">Oscillations</a>
                </div>
            </span>
            <span class="nav-dropdown" id="navJobQueue">
                <a href="/remote"><span id="navJobDot" class="nav-job-dot" style="display:none;"></span>Jobs</a>
                <div class="nav-dropdown-menu nav-jobs-dropdown" id="navJobsPanel">
                    <div style="padding:8px 12px;font-size:11px;color:var(--text-muted);">Loading...</div>
                </div>
            </span>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="videos-outer">

        <!-- Subject + trial buttons row (hidden by nav.js, synced to global selector) -->
        <div class="videos-topbar">
            <select id="subjectSelect"></select>
            <div id="trialBtns"></div>
            <button class="btn btn-sm" id="browseBtn" title="Open any video file">Browse…</button>
            <input type="file" id="browseInput" accept="video/*" style="display:none;">
        </div>

        <!-- Video canvas -->
        <div class="videos-viewport">
            <canvas id="canvas"></canvas>
        </div>

        <!-- Bottom controls -->
        <div class="videos-controls">
            <!-- Timeline -->
            <div class="timeline-row">
                <div class="timeline-wrap" id="timelineWrap">
                    <input type="range" id="timelineSlider" min="0" max="1000" value="0">
                    <div id="trimUI" style="display:none;">
                        <div id="trimTrack"></div>
                        <input type="range" id="trimStart" class="trim-slider" min="0" max="1000" value="0">
                        <input type="range" id="trimEnd"   class="trim-slider" min="0" max="1000" value="1000">
                    </div>
                </div>
                <span class="frame-counter">
                    Frame <strong id="frameDisplay">0</strong> / <strong id="totalFramesDisplay">0</strong>
                </span>
            </div>
            <!-- Playback -->
            <div class="playback-row">
                <button class="btn btn-sm" id="prevFrameBtn" title="Prev frame (A/←)">&#8592;</button>
                <button class="btn btn-sm" id="playBtn"     title="Play/Pause (Space)">&#9654;</button>
                <button class="btn btn-sm" id="nextFrameBtn" title="Next frame (S/→)">&#8594;</button>

                <div class="divider"></div>

                <div class="speed-wrap">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0" max="10" value="3">
                    <span id="speedDisplay">1x</span>
                </div>

                <div class="divider"></div>

                <button class="btn btn-sm" id="sideToggle"  title="Switch camera (E)">Switch Camera</button>
                <button class="btn btn-sm" id="resetZoomBtn" title="Reset zoom (Z)">Reset Zoom</button>

                <div class="spacer"></div>

                <button class="btn btn-sm" id="exportBtn" onclick="toggleExportMode()">Export Video</button>
                <button class="btn btn-sm" id="exportCancelBtn" style="display:none;" onclick="exitExportMode()">Cancel</button>
                <span id="exportStatus"></span>
            </div>
        </div>

    </div>

    <script src="/static/js/nav.js?v=9"></script>
    <script src="/static/js/api.js?v=12"></script>
    <script src="/static/js/video-export.js?v=3"></script>
    <script src="/static/js/videos.js?v=14"></script>
</body>
</html>
