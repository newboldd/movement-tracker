<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker</title>
    <link rel="stylesheet" href="/static/css/main.css?v=8">
    <style>
        body { overflow: hidden; }

        .deid-outer {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 49px);
            overflow: hidden;
        }

        /* ── Top bar ── */
        .deid-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 14px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .deid-topbar select {
            padding: 4px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 13px;
        }
        #trialBtns { display: flex; gap: 4px; flex-wrap: wrap; }
        .trial-btn {
            padding: 3px 10px; border-radius: 4px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text-muted); cursor: pointer; font-size: 12px;
            font-family: inherit; transition: all 0.15s;
        }
        .trial-btn:hover { border-color: var(--blue); color: var(--text); }
        .trial-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* ── Main layout: sidebar (left) + canvas ── */
        .deid-main {
            flex: 1; display: flex; min-height: 0; overflow: hidden;
        }
        .deid-viewport {
            flex: 1; position: relative; min-height: 0;
            background: #111; overflow: hidden;
        }
        .deid-viewport canvas {
            display: block; width: 100%; height: 100%;
        }

        /* ── Left sidebar ── */
        .deid-sidebar {
            width: 260px; flex-shrink: 0;
            background: var(--bg-card); border-right: 1px solid var(--border);
            overflow-y: auto; padding: 12px;
            order: -1;  /* left of canvas */
        }
        .deid-sidebar h3 {
            font-size: 13px; color: var(--text-muted); margin: 0 0 8px;
        }
        .deid-sidebar .section { margin-bottom: 16px; }

        .spot-item {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 6px; border-radius: 4px; font-size: 11px;
            margin-bottom: 4px; background: var(--bg);
            border: 1px solid var(--border); cursor: pointer;
        }
        .spot-item.selected { border-color: var(--blue); background: rgba(33,150,243,0.08); }
        .spot-item .spot-label { flex: 1; }
        .spot-item .spot-delete {
            cursor: pointer; color: var(--text-muted); font-size: 14px;
        }
        .spot-item .spot-delete:hover { color: var(--danger); }

        .slider-row {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; margin-bottom: 4px;
        }
        .slider-row input[type=range] { flex: 1; }
        .slider-row label { min-width: 60px; color: var(--text-muted); }
        .slider-row .val { min-width: 30px; text-align: right; }

        .frame-range {
            display: flex; gap: 4px; align-items: center; font-size: 11px;
            margin-top: 2px;
        }
        .frame-range input {
            width: 55px; padding: 2px 4px; font-size: 11px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 3px; color: var(--text);
        }

        /* ── Timeline ── */
        .deid-timeline {
            height: 90px; flex-shrink: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 4px 14px;
        }
        .deid-timeline canvas {
            display: block; width: 100%; height: 100%;
        }

        /* ── Bottom controls ── */
        .deid-controls {
            flex-shrink: 0; background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 8px 14px 10px;
        }
        .controls-row {
            display: flex; align-items: center; gap: 10px;
        }
        .frame-display { font-size: 12px; color: var(--text-muted); min-width: 120px; }
        .play-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .play-btn:hover { border-color: var(--blue); }

        #statusMsg {
            font-size: 11px; color: var(--text-muted); margin-top: 4px;
        }

        /* Greyed-out hand section */
        .hand-disabled { opacity: 0.5; pointer-events: none; }
        .hand-disabled .btn { pointer-events: auto; opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/">Movement Tracker</a></h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/videos">Videos</a>
            <a href="/mediapipe-select">MediaPipe</a>
            <a href="/deidentify" class="active">Deidentify</a>
            <a href="/labeling-select">DLC</a>
            <a href="/results">Results</a>
            <a href="/remote">Processing</a>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="deid-outer">
        <!-- Top bar: subject + trial selection -->
        <div class="deid-topbar">
            <label style="font-size:12px;color:var(--text-muted);">Subject</label>
            <select id="subjectSelect"></select>
            <div id="trialBtns"></div>
            <span id="statusMsg"></span>
        </div>

        <div class="deid-main">
            <!-- Left sidebar -->
            <div class="deid-sidebar">
                <!-- Face Detection -->
                <div class="section">
                    <h3>Face Detection</h3>
                    <button class="btn btn-sm" id="detectFacesBtn" onclick="deid.detectFaces()" style="width:100%;">
                        Detect Faces
                    </button>
                    <div id="faceDetStatus" style="font-size:11px;color:var(--text-muted);margin-top:4px;"></div>
                </div>

                <!-- Blur Spots -->
                <div class="section">
                    <h3>Blur Spots</h3>
                    <div id="spotList"></div>
                    <div style="display:flex;gap:4px;margin-top:6px;">
                        <button class="btn btn-sm" id="addCustomBtn" onclick="deid.toggleAddCustom()" style="flex:1;">
                            + Custom Spot
                        </button>
                    </div>
                </div>

                <!-- Selected Spot Controls -->
                <div class="section" id="spotControls" style="display:none;">
                    <h3>Selected Spot</h3>
                    <div class="slider-row">
                        <label>Width</label>
                        <input type="range" id="widthSlider" min="10" max="400" value="80"
                               oninput="deid.updateSpotDim('width', this.value)">
                        <span class="val" id="widthVal">80</span>
                    </div>
                    <div class="slider-row">
                        <label>Height</label>
                        <input type="range" id="heightSlider" min="10" max="400" value="80"
                               oninput="deid.updateSpotDim('height', this.value)">
                        <span class="val" id="heightVal">80</span>
                    </div>
                    <div class="slider-row">
                        <label>Offset X</label>
                        <input type="range" id="offsetXSlider" min="-200" max="200" value="0"
                               oninput="deid.updateSpotDim('offset_x', this.value)">
                        <span class="val" id="offsetXVal">0</span>
                    </div>
                    <div class="slider-row">
                        <label>Offset Y</label>
                        <input type="range" id="offsetYSlider" min="-200" max="200" value="0"
                               oninput="deid.updateSpotDim('offset_y', this.value)">
                        <span class="val" id="offsetYVal">0</span>
                    </div>
                    <div class="frame-range">
                        <span>Frames:</span>
                        <input type="number" id="frameStartInput" onchange="deid.updateSpotFrameRange()">
                        <span>to</span>
                        <input type="number" id="frameEndInput" onchange="deid.updateSpotFrameRange()">
                    </div>
                </div>

                <!-- Hand Overlap Tool -->
                <div class="section" id="handSection">
                    <h3>Hand Overlap</h3>
                    <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;">
                        <input type="checkbox" id="handOverlayToggle" onchange="deid.toggleHandOverlay(this.checked)">
                        Show hand landmarks
                    </label>
                    <div class="slider-row" style="margin-top:6px;">
                        <label>Mask size</label>
                        <input type="range" id="handRadiusSlider" min="5" max="80" value="10"
                               oninput="deid.updateHandRadius(this.value)">
                        <span class="val" id="handRadiusVal">10</span>
                    </div>
                    <div class="slider-row">
                        <label>Smooth</label>
                        <input type="range" id="handSmoothSlider" min="0" max="60" value="10"
                               oninput="deid.updateHandSmooth(this.value)">
                        <span class="val" id="handSmoothVal">10</span>
                    </div>
                    <div class="slider-row">
                        <label>Temporal</label>
                        <input type="range" id="handTemporalSlider" min="0" max="15" value="0"
                               oninput="deid.updateHandTemporalSmooth(this.value)">
                        <span class="val" id="handTemporalVal">0</span>
                    </div>
                    <div style="display:flex;gap:4px;margin-top:6px;">
                        <button class="btn btn-sm" onclick="deid.deleteSelectedHandSeg()" style="flex:1;font-size:11px;" title="Delete selected hand segment (Del)">
                            Remove Segment
                        </button>
                    </div>
                    <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">
                        Drag on the timeline hand row to create protection segments. Each segment can have its own radius.
                    </div>
                    <button class="btn btn-sm" id="goMediapipeBtn" onclick="deid.goToMediapipe()"
                            style="width:100%;margin-top:6px;">Run MediaPipe</button>
                </div>

                <!-- Render -->
                <div class="section">
                    <h3>Render</h3>
                    <button class="btn btn-sm btn-success" id="renderBtn" onclick="deid.renderAll()" style="width:100%;">
                        Render All Trials
                    </button>
                    <div id="renderStatus" style="font-size:11px;color:var(--text-muted);margin-top:4px;"></div>
                </div>
            </div>

            <!-- Canvas viewport -->
            <div class="deid-viewport">
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <!-- Timeline: face/hand detection coverage + blur spot ranges -->
        <div class="deid-timeline">
            <canvas id="timelineCanvas"></canvas>
        </div>

        <!-- Bottom controls: play/pause, camera toggle, frame slider -->
        <div class="deid-controls">
            <div class="controls-row">
                <button class="play-btn" id="playBtn" tabindex="-1" onclick="deid.togglePlay()">&#9654;</button>
                <span class="frame-display" id="cameraLabel" style="font-weight:600;min-width:30px;">OS</span>
                <button class="btn btn-sm" tabindex="-1" onclick="deid.toggleSide()" title="Toggle camera (E)">Switch Camera</button>
                <span class="frame-display" id="frameDisplay">Frame: 0 / 0</span>
                <button class="btn btn-sm" tabindex="-1" onclick="deid.resetZoom()" title="Reset zoom (R)" style="font-size:11px;">Reset</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/nav.js"></script>
    <script src="/static/js/deidentify.js?v=12"></script>
</body>
</html>
