<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker</title>
    <link rel="stylesheet" href="/static/css/main.css?v=3">
</head>
<body class="results-page">
    <div class="header">
        <div style="display:flex;align-items:center;gap:16px;">
            <h1 style="margin:0;"><a href="/" style="font-size:18px;">Movement Tracker</a></h1>
            <!-- Subject selector -->
            <div style="display:flex;align-items:center;gap:8px;">
                <select id="subjectSelect" class="subject-select">
                    <option value="">Select a subject...</option>
                </select>
                <button class="btn btn-sm" id="prevSubjectBtn" title="Previous subject">&larr;</button>
                <button class="btn btn-sm" id="nextSubjectBtn" title="Next subject">&rarr;</button>
            </div>
            <!-- Tab Switcher -->
            <!-- Tab buttons hidden — navigation via Results dropdown menu -->
            <div id="tabSwitcher" style="display:none;">
                <button class="btn btn-sm active" data-tab="distances">Individual</button>
                <button class="btn btn-sm" data-tab="group">Group Comparison</button>
            </div>
        </div>
        <nav>
            <a href="/videos" class="nav-browse">Browse Videos</a>
            <a href="/subjects">Subjects</a>
            <span class="nav-dropdown">
                <a href="/labels">Analyze</a>
                <div class="nav-dropdown-menu">
                    <a href="/preproc">Pre-proc</a>
                    <a href="/labels">Labels</a>
                    <a href="/labeling-select">DLC</a>
                    <a href="/events">Events</a>
                    <a href="/deidentify">Deidentify</a>
                </div>
            </span>
            <span class="nav-dropdown">
                <a href="/results" class="active">Results</a>
                <div class="nav-dropdown-menu">
                    <a href="/results" class="active">Individual</a>
                    <a href="/results?tab=group">Group Comparison</a>
                    <a href="/oscillations">Oscillations</a>
                </div>
            </span>
            <span class="nav-dropdown" id="navJobQueue">
                <a href="/remote"><span id="navJobDot" class="nav-job-dot" style="display:none;"></span>Jobs</a>
                <div class="nav-dropdown-menu nav-jobs-dropdown" id="navJobsPanel">
                    <div style="padding:8px 12px;font-size:11px;color:var(--text-muted);">Loading...</div>
                </div>
            </span>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="results-container">
        <!-- Distances Tab -->
        <div id="tabDistances" class="results-tab active">
            <div class="distance-controls" id="distanceControls">
                <label title="Seconds of trace shown per screen width — lower = more stretched out."
                       style="display:flex;align-items:center;gap:6px;margin:0;">
                    X scale:
                    <input type="range" id="xScaleSlider" min="5" max="60" step="1" value="20" style="width:120px;">
                    <span id="xScaleVal" style="font-size:11px;color:#666;min-width:34px;">20 s</span>
                </label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 6px;"></span>
                <label style="display:flex;align-items:center;gap:6px;margin:0;">Source:
                    <select id="resultsSourceSelect" style="min-width:140px;">
                        <option value="auto" selected>Auto</option>
                        <option value="corrections">DLC (corrected)</option>
                        <option value="mp_combined">MP combined</option>
                        <option value="mp_forward">MP forward</option>
                    </select>
                </label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 6px;"></span>
                <label title="When checked, the Y-range sliders on any trial control every trial's plots of the same type."><input type="checkbox" id="lockYAxis" checked> Lock Y-axis</label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 6px;"></span>
                <label><input type="checkbox" id="overlayPeakDist"> Peak Distance</label>
                <label><input type="checkbox" id="overlayPeakOpenVel"> Peak Open Vel</label>
                <label><input type="checkbox" id="overlayPeakCloseVel"> Peak Close Vel</label>
                <span id="overlayR2" style="font-size:11px;color:#666;font-weight:600;"></span>
            </div>
            <div id="distancePlots">
                <div class="results-no-data">Select a subject to view distance traces</div>
            </div>

            <!-- Movement parameters (plotted below distance traces) -->
            <div class="results-controls" id="distMovementControls" style="margin-top:12px;display:none;flex-wrap:wrap;">
                <label title="Horizontal scale of the movement plots."
                       style="display:flex;align-items:center;gap:6px;margin:0;">
                    X scale:
                    <input type="range" id="movXScaleSlider" min="1" max="4" step="0.25" value="1" style="width:110px;">
                    <span id="movXScaleVal" style="font-size:11px;color:#666;min-width:30px;">1.0×</span>
                </label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 4px;"></span>
                <label><input type="checkbox" data-dparam="amplitude" checked> Amplitude</label>
                <label><input type="checkbox" data-dparam="imi" checked> IMI</label>
                <label><input type="checkbox" data-dparam="peak_open_vel" checked> Peak Opening Vel.</label>
                <label><input type="checkbox" data-dparam="peak_close_vel" checked> Peak Closing Vel.</label>
                <label><input type="checkbox" data-dparam="power"> Power</label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 4px;"></span>
                <label style="display:flex;align-items:center;gap:4px;">
                    Sequence Calculation:
                    <select id="distSequenceMode"
                        style="padding:3px 8px;background:#f0f0f0;border:1px solid #ccc;
                               border-radius:4px;color:#444;font-size:12px;">
                        <option value="none">None</option>
                        <option value="linear_full">Linear (full)</option>
                        <option value="linear_first10">Linear (first 10)</option>
                        <option value="linear_multi">Linear (multi-seq)</option>
                        <option value="exp_full">Exponential (full)</option>
                        <option value="exp_first10">Exponential (first 10)</option>
                        <option value="exp_multi" selected>Exponential (multi-seq)</option>
                    </select>
                </label>
                <!-- Second row: less-common parameters (indented to align
                     under the first-row checkboxes via a hidden copy of
                     the X-scale control). -->
                <div style="flex-basis:100%;height:0;"></div>
                <label aria-hidden="true"
                       style="display:flex;align-items:center;gap:6px;margin:0;visibility:hidden;">
                    X scale:
                    <input type="range" min="1" max="4" step="0.25" value="1" style="width:110px;" tabindex="-1">
                    <span style="font-size:11px;min-width:30px;">1.0×</span>
                </label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 4px;visibility:hidden;"></span>
                <label><input type="checkbox" data-dparam="peak_dist"> Peak Distance</label>
                <label><input type="checkbox" data-dparam="rel_amplitude"> Relative Amplitude</label>
                <label><input type="checkbox" data-dparam="mean_open_vel"> Mean Opening Vel.</label>
                <label><input type="checkbox" data-dparam="mean_close_vel"> Mean Closing Vel.</label>
            </div>
            <div id="distMovementPlots" class="results-plot-grid"></div>
        </div>

        <!-- Movements Tab (hidden, kept for JS compatibility) -->
        <div id="tabMovements" class="results-tab" style="display:none!important;">
            <div id="movementControls" style="display:none;">
                <select id="sequenceMode"><option value="none">None</option></select>
                <span id="seqInfo"></span>
            </div>
            <div id="movementEventBanner"></div>
            <div id="movementPlots" class="results-plot-grid">
                <div class="results-no-data" style="grid-column:1/-1;">Select a subject to view movement parameters</div>
            </div>
        </div>

        <!-- Group Comparison Tab -->
        <div id="tabGroup" class="results-tab">
            <div class="results-controls" id="groupControls">
                <label><input type="checkbox" id="includeAutoToggle"> Include auto-detected events</label>
                <button class="btn btn-sm" id="groupSelectAllBtn" type="button">All</button>
                <button class="btn btn-sm" id="groupSelectNoneBtn" type="button">None</button>
                <span id="highlightedSubject"></span>
            </div>
            <div id="groupSubjectList" class="group-subject-list"></div>
            <div id="groupPlots" class="results-plot-grid">
                <div class="results-no-data" style="grid-column:1/-1;">Loading group data...</div>
            </div>
        </div>
        <style>
            .group-subject-list {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                padding: 6px;
                margin-bottom: 8px;
                background: var(--bg, #f5f5f5);
                border-radius: 4px;
                max-height: 140px;
                overflow-y: auto;
            }
            .group-subject-list label {
                display: inline-flex;
                align-items: center;
                gap: 3px;
                font-size: 11px;
                padding: 2px 6px;
                border-radius: 3px;
                border: 1px solid #ddd;
                background: #fff;
                cursor: pointer;
                user-select: none;
            }
            .group-subject-list label.dim {
                opacity: 0.45;
            }
            .group-subject-list label input { margin: 0; }
            .group-subject-list .gsl-dot {
                display: inline-block;
                width: 8px; height: 8px;
                border-radius: 50%;
            }
            /* Dual-thumb vertical Y-range slider (shared track) — same
               pattern as the Labels page Y-lim sliders. */
            .yslider-col {
                display: flex;
                flex-direction: column;
                flex: 0 0 auto;
                padding-right: 4px;
            }
            .y-range-wrap { position: relative; width: 16px; flex-shrink: 0; }
            .y-range-wrap .y-track { position: absolute; left: 6px; top: 0; bottom: 0; width: 4px; background: #d0d0d0; border-radius: 2px; pointer-events: none; }
            .y-range-wrap .y-fill { position: absolute; left: 6px; width: 4px; background: #2196F3; border-radius: 2px; pointer-events: none; }
            .y-range-wrap.vel .y-fill { background: #4CAF50; }
            .y-range-wrap input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; position: absolute; left: 0; width: 16px; margin: 0; pointer-events: none; }
            .y-range-wrap input[type=range]::-webkit-slider-runnable-track { width: 4px; background: transparent; }
            .y-range-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: #2196F3; margin-left: -3px; cursor: ns-resize; pointer-events: auto; }
            .y-range-wrap input[type=range]::-moz-range-track { width: 4px; background: transparent; }
            .y-range-wrap input[type=range]::-moz-range-thumb { width: 11px; height: 11px; border-radius: 50%; background: #2196F3; border: none; cursor: ns-resize; pointer-events: auto; }
            .y-range-wrap.vel input[type=range]::-webkit-slider-thumb { background: #4CAF50; }
            .y-range-wrap.vel input[type=range]::-moz-range-thumb { background: #4CAF50; }
        </style>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="/static/js/nav.js?v=9"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/results.js?v=33"></script>
</body>
</html>
