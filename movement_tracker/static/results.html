<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker</title>
    <link rel="stylesheet" href="/static/css/main.css?v=3">
</head>
<body class="results-page">
    <div class="header">
        <div style="display:flex;align-items:center;gap:16px;">
            <h1 style="margin:0;"><a href="/" style="font-size:18px;">Movement Tracker</a></h1>
            <!-- Subject selector -->
            <div style="display:flex;align-items:center;gap:8px;">
                <select id="subjectSelect" class="subject-select">
                    <option value="">Select a subject...</option>
                </select>
                <button class="btn btn-sm" id="prevSubjectBtn" title="Previous subject">&larr;</button>
                <button class="btn btn-sm" id="nextSubjectBtn" title="Next subject">&rarr;</button>
            </div>
            <!-- Tab Switcher -->
            <!-- Tab buttons hidden — navigation via Results dropdown menu -->
            <div id="tabSwitcher" style="display:none;">
                <button class="btn btn-sm active" data-tab="distances">Individual</button>
                <button class="btn btn-sm" data-tab="group">Group Comparison</button>
            </div>
        </div>
        <nav>
            <a href="/videos" class="nav-browse">Browse Videos</a>
            <a href="/subjects">Subjects</a>
            <span class="nav-dropdown">
                <a href="/analyze">Analyze</a>
                <div class="nav-dropdown-menu">
                    <a href="/analyze">Detect</a>
                    <a href="/labeling-select">DLC</a>
                    <a href="/mano">MANO</a>
                    <a href="/events">Events</a>
                    <a href="/deidentify">Deidentify</a>
                </div>
            </span>
            <span class="nav-dropdown">
                <a href="/results" class="active">Results</a>
                <div class="nav-dropdown-menu">
                    <a href="/results" class="active">Individual</a>
                    <a href="/results?tab=group">Group Comparison</a>
                    <a href="/oscillations">Oscillations</a>
                </div>
            </span>
            <span class="nav-dropdown" id="navJobQueue">
                <a href="/remote"><span id="navJobDot" class="nav-job-dot" style="display:none;"></span>Jobs</a>
                <div class="nav-dropdown-menu nav-jobs-dropdown" id="navJobsPanel">
                    <div style="padding:8px 12px;font-size:11px;color:var(--text-muted);">Loading...</div>
                </div>
            </span>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="results-container">
        <!-- Distances Tab -->
        <div id="tabDistances" class="results-tab active">
            <div class="distance-controls" id="distanceControls">
                <label><input type="checkbox" id="lockYAxis" checked> Lock Y-axis</label>
                <span id="yAxisInputs">
                    <label style="margin:0;">Min: <input type="number" id="yAxisMin" step="1" placeholder="auto"></label>
                    <label style="margin:0;">Max: <input type="number" id="yAxisMax" step="1" placeholder="auto"></label>
                </span>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 6px;"></span>
                <label><input type="checkbox" id="overlayPeakDist"> Peak Distance</label>
                <label><input type="checkbox" id="overlayPeakOpenVel"> Peak Open Vel</label>
                <label><input type="checkbox" id="overlayPeakCloseVel"> Peak Close Vel</label>
                <label><input type="checkbox" id="overlaySequences"> Sequences</label>
                <span id="overlayR2" style="font-size:11px;color:#666;font-weight:600;"></span>
            </div>
            <div id="distancePlots">
                <div class="results-no-data">Select a subject to view distance traces</div>
            </div>

            <!-- Movement parameters (plotted below distance traces) -->
            <div class="results-controls" id="distMovementControls" style="margin-top:12px;display:none;">
                <span style="font-weight:600;font-size:12px;margin-right:8px;">Movements:</span>
                <label><input type="checkbox" data-dparam="peak_dist"> Peak Distance</label>
                <label><input type="checkbox" data-dparam="amplitude" checked> Amplitude</label>
                <label><input type="checkbox" data-dparam="imi" checked> IMI</label>
                <label><input type="checkbox" data-dparam="peak_open_vel" checked> Peak Opening Vel.</label>
                <label><input type="checkbox" data-dparam="peak_close_vel" checked> Peak Closing Vel.</label>
                <label><input type="checkbox" data-dparam="rel_amplitude"> Relative Amplitude</label>
                <label><input type="checkbox" data-dparam="power"> Power</label>
                <label><input type="checkbox" data-dparam="mean_open_vel"> Mean Opening Vel.</label>
                <label><input type="checkbox" data-dparam="mean_close_vel"> Mean Closing Vel.</label>
                <span style="border-left:1px solid #ccc;height:20px;margin:0 4px;"></span>
                <label style="display:flex;align-items:center;gap:4px;">
                    Fit:
                    <select id="distSequenceMode"
                        style="padding:3px 8px;background:#f0f0f0;border:1px solid #ccc;
                               border-radius:4px;color:#444;font-size:12px;">
                        <option value="none">None</option>
                        <option value="linear_full">Linear (full)</option>
                        <option value="linear_first10">Linear (first 10)</option>
                        <option value="linear_multi">Linear (multi-seq)</option>
                        <option value="exp_full">Exponential (full)</option>
                        <option value="exp_first10">Exponential (first 10)</option>
                        <option value="exp_multi" selected>Exponential (multi-seq)</option>
                    </select>
                </label>
                <span id="distSeqInfo" style="font-size:11px;color:#666;"></span>
            </div>
            <div id="distMovementPlots" class="results-plot-grid"></div>
        </div>

        <!-- Movements Tab (hidden, kept for JS compatibility) -->
        <div id="tabMovements" class="results-tab" style="display:none!important;">
            <div id="movementControls" style="display:none;">
                <select id="sequenceMode"><option value="none">None</option></select>
                <span id="seqInfo"></span>
            </div>
            <div id="movementEventBanner"></div>
            <div id="movementPlots" class="results-plot-grid">
                <div class="results-no-data" style="grid-column:1/-1;">Select a subject to view movement parameters</div>
            </div>
        </div>

        <!-- Group Comparison Tab -->
        <div id="tabGroup" class="results-tab">
            <div class="results-controls" id="groupControls">
                <label><input type="checkbox" id="includeAutoToggle"> Include auto-detected events</label>
                <span id="highlightedSubject"></span>
            </div>
            <div id="groupPlots" class="results-plot-grid">
                <div class="results-no-data" style="grid-column:1/-1;">Loading group data...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="/static/js/nav.js?v=2"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/results.js?v=9"></script>
</body>
</html>
