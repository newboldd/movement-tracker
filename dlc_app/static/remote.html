<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Jobs</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .remote-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .full-width { grid-column: 1 / -1; }
        .subject-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px;
            background: var(--bg);
            border-radius: var(--radius);
        }
        .subject-grid label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border);
        }
        .subject-grid label:hover { border-color: var(--blue); }
        .subject-grid label.checked { background: var(--accent); border-color: var(--blue); }
        .lane-panel {
            padding: 12px;
            background: var(--bg);
            border-radius: var(--radius);
            min-height: 60px;
        }
        .lane-panel h4 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .queue-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 13px;
            background: var(--bg-card);
        }
        .queue-item .pos {
            color: var(--text-muted);
            font-size: 11px;
            min-width: 20px;
        }
        .queue-item .type { font-weight: 600; }
        .queue-item .subjects {
            color: var(--text-muted);
            font-size: 12px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .history-table th {
            text-align: left;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
        }
        .history-table td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
        }
        .step-select, .redownload-step, .redownload-subject {
            padding: 6px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        .empty-state {
            color: var(--text-muted);
            font-size: 13px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Remote Jobs</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/remote" class="active">Remote</a>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="container">
        <!-- Launch Job -->
        <div class="card">
            <h2>Launch Job</h2>
            <div class="toolbar">
                <label style="font-size:13px;color:var(--text-muted);">Step:</label>
                <select id="stepSelect" class="step-select"></select>
                <div style="flex:1;"></div>
                <button class="btn btn-sm" onclick="selectAllSubjects()">Select All</button>
                <button class="btn btn-sm" onclick="clearSubjects()">Clear</button>
                <button class="btn btn-primary" onclick="submitJob()">Submit Job</button>
            </div>
            <div id="subjectGrid" class="subject-grid">
                <span class="empty-state">Loading subjects...</span>
            </div>
        </div>

        <!-- Queue -->
        <div class="card">
            <h2>Queue</h2>
            <div class="remote-grid">
                <div class="lane-panel">
                    <h4>GPU Lane</h4>
                    <div id="gpuLane"><span class="empty-state">Empty</span></div>
                </div>
                <div class="lane-panel">
                    <h4>CPU Lane</h4>
                    <div id="cpuLane"><span class="empty-state">Empty</span></div>
                </div>
            </div>
        </div>

        <!-- Job History -->
        <div class="card">
            <h2>Job History</h2>
            <div id="historyContent">
                <span class="empty-state">No completed jobs yet.</span>
            </div>
        </div>

        <!-- Re-download -->
        <div class="card">
            <h2>Re-download Results</h2>
            <div class="toolbar">
                <label style="font-size:13px;color:var(--text-muted);">Step:</label>
                <select id="redownloadStep" class="redownload-step" onchange="onRedownloadStepChange()">
                    <option value="mediapipe">MediaPipe</option>
                    <option value="blur">Face Blur</option>
                    <option value="mediapipe+blur">MediaPipe + Blur</option>
                    <option value="train">Train</option>
                    <option value="analyze_v1">Analyze v1</option>
                    <option value="analyze_v2">Analyze v2</option>
                </select>
                <label style="font-size:13px;color:var(--text-muted);">Subject:</label>
                <select id="redownloadSubject" class="redownload-subject"></select>
                <span id="redownloadHint" style="font-size:11px;color:var(--text-muted);display:none;">
                    (or use Launch Job above to re-download for multiple subjects)
                </span>
                <button class="btn btn-sm" onclick="redownload()">Download</button>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div class="modal-overlay" id="logModal">
        <div class="modal" style="min-width:600px;max-width:80vw;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h3 style="margin:0;">Job Log</h3>
                <button class="btn btn-sm" onclick="closeLogModal()">Close</button>
            </div>
            <pre id="logContent" style="max-height:60vh;overflow:auto;background:var(--bg);padding:12px;border-radius:var(--radius);font-size:12px;white-space:pre-wrap;word-break:break-all;margin:0;"></pre>
        </div>
    </div>

    <script src="/static/js/api.js?v=13"></script>
    <script src="/static/js/remote.js?v=1"></script>
</body>
</html>
