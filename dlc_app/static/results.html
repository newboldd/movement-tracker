<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLC Results</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="header">
        <h1>Analysis Results</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/results" class="active">Results</a>
            <a href="/remote">Remote</a>
            <a href="/settings">Settings</a>
        </nav>
    </div>

    <div class="container">
        <div style="margin-bottom: 16px;">
            <select id="subjectSelect"
                style="padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border);
                       border-radius: var(--radius); color: var(--text); font-size: 14px; min-width: 200px;">
                <option value="">Select a subject...</option>
            </select>
        </div>

        <div id="resultsContent">
            <div class="card" style="text-align:center;color:var(--text-muted);padding:40px;">
                Select a subject to view results
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/results.js"></script>
</body>
</html>
