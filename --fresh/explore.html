<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement Tracker — Explore</title>
    <link rel="stylesheet" href="static/css/main.css?v=3">
    <style>
        /* Subject checkbox list (same look as the Group Comparison page). */
        .ex-subject-list {
            display: flex; flex-wrap: wrap; gap: 4px 6px;
            padding: 6px 0; margin-top: 8px;
            background: transparent; max-height: 200px; overflow-y: auto;
        }
        .ex-subject-list .gsl-group { flex-basis: 100%; display: flex; gap: 4px; align-items: flex-start; }
        .ex-subject-list .gsl-group-label { font-size: 11px; font-weight: 600; color: var(--text-muted);
                                            flex: 0 0 auto; min-width: 64px; padding-top: 3px; }
        .ex-subject-list .gsl-tags { display: flex; flex-wrap: wrap; gap: 4px;
                                     flex: 1 1 auto; min-width: 0; }
        .ex-subject-list label {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 11px; padding: 2px 6px; border-radius: 3px;
            border: 1px solid var(--border, #ddd); background: var(--bg-card, #fff);
            cursor: pointer; user-select: none;
        }
        .ex-subject-list label.dim { opacity: 0.45; }
        .ex-subject-list label input { margin: 0; }
    </style>
    <script>window.STATIC_RESULTS = true;</script>
<style>#__gate{position:fixed;inset:0;background:#0b1220;display:flex;align-items:center;justify-content:center;z-index:99999;font:14px system-ui,sans-serif;color:#e7eaf0;}#__gate form{background:#141c2e;padding:24px 28px;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:10px;min-width:260px;}#__gate input{padding:8px 10px;border:1px solid #2a3550;border-radius:4px;background:#0b1220;color:#e7eaf0;font-size:14px;}#__gate button{padding:8px 12px;border:0;border-radius:4px;background:#3b82f6;color:#fff;font-size:14px;cursor:pointer;}#__gate .err{color:#f87171;min-height:1em;font-size:12px;}html.__locked body{visibility:hidden;}</style><script>(function(){var H='bf37c7c208717d6de100ce851b48273f8d5d945c8dc64fc64372087ffcf88ba9';if(sessionStorage.getItem('__unlocked')==='1')return;document.documentElement.classList.add('__locked');async function sha(s){var b=new TextEncoder().encode(s);var h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');}document.addEventListener('DOMContentLoaded',function(){var g=document.createElement('div');g.id='__gate';g.innerHTML='<form><div>Password required</div><input type=password autofocus autocomplete=off><button type=submit>Unlock</button><div class=err></div></form>';document.documentElement.appendChild(g);g.querySelector('form').addEventListener('submit',async function(e){e.preventDefault();var v=g.querySelector('input').value;var h=await sha(v);if(h===H){sessionStorage.setItem('__unlocked','1');document.documentElement.classList.remove('__locked');g.remove();}else{g.querySelector('.err').textContent='Incorrect';g.querySelector('input').select();}});});})();</script>
</head>
<body class="results-page"><a href="index.html" style="position:fixed;top:10px;right:14px;z-index:99;background:#fff;padding:4px 10px;border:1px solid #ddd;border-radius:4px;text-decoration:none;color:#444;font-size:13px;">← Results</a>
    <div class="header">
        <div style="display:flex;align-items:center;gap:16px;">
            <h1 style="margin:0;"><a href="index.html" style="font-size:18px;">Movement Tracker</a></h1>
            <span style="font-size:13px;color:var(--text-muted);">Variable Explorer</span>
        </div>
        
    </div>

    <div class="results-container">
        <!-- Data-source controls (movement variables depend on these) -->
        <div class="results-controls" id="exploreControls">
            <label style="display:flex;align-items:center;gap:6px;margin:0;">Source:
                <select id="exSourceSelect" style="min-width:140px;">
                    <option value="auto" selected>Auto</option>
                    <option value="corrections">DLC (corrected)</option>
                    <option value="mp_combined">MP combined</option>
                    <option value="mp_forward">MP forward</option>
                </select>
            </label>
            <label style="display:flex;align-items:center;gap:6px;margin:0;">Sequence effect:
                <select id="exSeqModeSelect" style="min-width:150px;">
                    <option value="none">None</option>
                    <option value="linear_full">Linear (full)</option>
                    <option value="linear_first10">Linear (first 10)</option>
                    <option value="linear_multi">Linear (multi-seq)</option>
                    <option value="exp_full">Exponential (full)</option>
                    <option value="exp_first10">Exponential (first 10)</option>
                    <option value="exp_multi" selected>Exponential (multi-seq)</option>
                </select>
            </label>
            <label style="display:flex;align-items:center;gap:6px;margin:0;">Hand:
                <select id="exHandSelect" style="min-width:130px;">
                    <option value="more" selected>More affected</option>
                    <option value="less">Less affected</option>
                    <option value="L">Left</option>
                    <option value="R">Right</option>
                    <option value="average">Average</option>
                </select>
            </label>
            <label style="display:flex;align-items:center;gap:6px;margin:0;">Trial:
                <select id="exTrialSelect" style="min-width:90px;">
                    <option value="first">First</option>
                    <option value="last" selected>Last</option>
                    <option value="average">Average</option>
                </select>
            </label>
            <label><input type="checkbox" id="exIncludeAuto"> Include auto-detected events</label>
            <button class="btn btn-sm" id="exSelectAllBtn" type="button">All</button>
        </div>

        <!-- Subject selection (color-coded by group, like Group Comparison) -->
        <div id="exSubjectList" class="ex-subject-list"></div>

        <!-- Plot-type + variable controls -->
        <div class="results-controls" id="explorePlotControls" style="margin-top:8px;">
            <label style="display:flex;align-items:center;gap:6px;margin:0;">Plot:
                <select id="exPlotType" style="min-width:150px;">
                    <option value="scatter" selected>Scatter (X vs Y)</option>
                    <option value="bar">Bar by group</option>
                </select>
            </label>
            <span style="border-left:1px solid #ccc;height:20px;margin:0 6px;"></span>
            <label id="exXLabel" style="display:flex;align-items:center;gap:6px;margin:0;">X:
                <select id="exVarX" style="min-width:200px;"></select>
            </label>
            <span id="exXAgg" class="agg-radios" style="display:flex;align-items:center;gap:8px;font-size:11px;"></span>
            <label id="exYLabel" style="display:flex;align-items:center;gap:6px;margin:0;">Y:
                <select id="exVarY" style="min-width:200px;"></select>
            </label>
            <span id="exYAgg" class="agg-radios" style="display:flex;align-items:center;gap:8px;font-size:11px;"></span>
            <label id="exLegendLabel" title="Show the group legend on the plot and in copies"
                   style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);">
                <input type="checkbox" id="exLegend" style="margin:0;" checked> Legend
            </label>
            <label id="exBestFitLabel" style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);">
                <input type="checkbox" id="exBestFit" style="margin:0;"> Slope
            </label>
            <span id="exInfo" style="font-size:11px;color:var(--text-muted);"></span>
            <span style="flex:1 1 auto;"></span>
            <button id="exCopyBtn" class="btn btn-sm" title="Copy to clipboard"
                    style="padding:4px 6px;line-height:0;">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round"
                     style="display:block;">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
            </button>
        </div>

        <div style="display:flex;align-items:flex-start;gap:12px;margin-top:12px;">
            <div id="explorePlot"
                 style="height:520px;width:50vw;flex:0 0 auto;resize:both;overflow:hidden;min-width:360px;min-height:240px;">
                <div class="results-no-data">Loading…</div>
            </div>
            <!-- Fit-stats text box: selectable HTML, never copied with the plot. -->
            <div id="exFitBox"
                 style="display:none;flex:0 0 auto;font:30px/1.25 system-ui,-apple-system,'Segoe UI',sans-serif;color:#000;white-space:pre;padding:14px 18px;background:#fff;border:1px solid #888;border-radius:6px;user-select:text;cursor:text;"></div>
        </div>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/explore.js?v=18"></script>
</body>
</html>
